<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{ subject_line }}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }

    body {
      margin: 0; padding: 0;
      background-color: #f5f0eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .email-wrapper {
      width: 100%;
      background-color: #f5f0eb;
      padding: 32px 0;
    }

    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Header */
    .header {
      background-color: #1a1a1a;
      padding: 28px 40px;
      text-align: center;
    }
    .header-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 14px auto;
    }
    .header-title {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px 0;
      letter-spacing: -0.3px;
    }
    .header-tagline {
      color: #999999;
      font-size: 13px;
      margin: 0;
    }
    .header-issue {
      display: inline-block;
      margin-top: 12px;
      background-color: #f5c842;
      color: #1a1a1a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* Body */
    .body-content {
      padding: 36px 40px;
      color: #1a1a1a;
      font-size: 16px;
      line-height: 1.7;
    }

    .body-content h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 32px 0 10px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #f5f0eb;
    }

    .body-content h3 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin: 20px 0 6px 0;
    }

    .body-content p {
      margin: 0 0 16px 0;
      color: #444444;
    }

    .body-content a {
      color: #d97706;
      text-decoration: none;
    }

    .body-content a:hover {
      text-decoration: underline;
    }

    .body-content blockquote {
      margin: 20px 0;
      padding: 14px 20px;
      background-color: #fdf8f0;
      border-left: 4px solid #f5c842;
      border-radius: 0 8px 8px 0;
      color: #666;
      font-size: 15px;
    }

    .body-content blockquote p {
      margin: 0;
      color: #666;
    }

    .body-content ul, .body-content ol {
      padding-left: 20px;
      margin: 0 0 16px 0;
    }

    .body-content li {
      margin-bottom: 6px;
      color: #444444;
    }

    .body-content hr {
      border: none;
      border-top: 1px solid #f0ebe4;
      margin: 28px 0;
    }

    /* CTA button */
    .cta-button {
      display: inline-block;
      background-color: #f5c842;
      color: #1a1a1a !important;
      font-weight: 700;
      font-size: 15px;
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none !important;
      margin: 8px 0;
    }

    /* Footer */
    .footer {
      background-color: #f5f0eb;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #ede8e1;
    }

    .footer p {
      font-size: 12px;
      color: #999999;
      margin: 0 0 6px 0;
      line-height: 1.6;
    }

    .footer a {
      color: #999999;
      text-decoration: underline;
    }

    /* Mobile */
    @media only screen and (max-width: 620px) {
      .email-wrapper { padding: 16px 0; }
      .email-container { border-radius: 0; }
      .header { padding: 24px 24px; }
      .body-content { padding: 28px 24px; }
      .footer { padding: 20px 24px; }
      .header-title { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <table role="presentation" class="email-container" width="100%" cellpadding="0" cellspacing="0" border="0" align="center" style="max-width:600px;margin:0 auto;">

      <!-- Header -->
      <tr>
        <td class="header">
          <img src="https://www.washdog.cl/washdog-social.png" alt="Washdog" class="header-logo" width="72" height="72">
          <h1 class="header-title">Santiago a Cuatro Patas</h1>
          <p class="header-tagline">La guía semanal para vivir Santiago con tu perro</p>
          <span class="header-issue">Edición #{{ issue_number }}</span>
        </td>
      </tr>

      <!-- Body -->
      <tr>
        <td class="body-content">
          {{ html_body | safe }}
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td class="footer">
          <p>
            <strong>WashDog Express</strong> · Av. Irarrázaval 2086 B, Ñuñoa · Lunes a domingo 10:00–20:00
          </p>
          <p>
            <a href="https://www.washdog.cl">washdog.cl</a> &nbsp;·&nbsp;
            <a href="https://www.instagram.com/washdogexpress/">@washdogexpress</a>
          </p>
          <p style="margin-top:14px;">
            <a href="{{ unsubscribe_url }}">Cancelar suscripción</a>
          </p>
        </td>
      </tr>

    </table>
  </div>
</body>
</html>
