  <!-- CONTACTO — location pin -->
  <symbol id="icon-contacto" viewBox="0 0 48 48">
    <path d="M24 4 C15 4 8 11 8 20 C8 31 24 44 24 44 C24 44 40 31 40 20 C40 11 33 4 24 4Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
