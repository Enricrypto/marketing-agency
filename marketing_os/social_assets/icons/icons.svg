    <line x1="21" y1="45" x2="27" y2="45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="12" x2="24" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 3"/>
