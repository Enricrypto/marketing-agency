    <ellipse cx="14" cy="18" rx="5" ry="7" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <ellipse cx="34" cy="18" rx="5" ry="7" fill="none" stroke="currentColor" stroke-width="2.5"/>
