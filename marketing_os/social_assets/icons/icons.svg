    <ellipse cx="17" cy="14" rx="3.5" ry="4.5" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <ellipse cx="31" cy="14" rx="3.5" ry="4.5" fill="none" stroke="currentColor" stroke-width="2.5"/>
  </symbol>

