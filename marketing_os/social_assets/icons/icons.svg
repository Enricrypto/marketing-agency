    <line x1="16" y1="34" x2="16" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="34" x2="24" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="34" x2="32" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="20" y2="43" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="38" x2="28" y2="43" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
